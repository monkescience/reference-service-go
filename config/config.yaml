# Log configuration using vital library
log_config:
  # Log level: debug, info, warn, error
  level: "info"
  # Log format: json or text
  format: "text"
  # Include source file and line number in logs
  add_source: false

# HTTP server configuration
server:
  port: 8080
  read_timeout: "10s"
  write_timeout: "10s"
  idle_timeout: "120s"
  shutdown_timeout: "20s"

# PostgreSQL database connection
database:
  url_env: "DATABASE_URL"

# PokeAPI client configuration
pokeapi:
  base_url: "https://pokeapi.co/api/v2"
  timeout: "30s"
  concurrency: 10

# OpenTelemetry tracing configuration
# When enabled is false, propagation still works but no exporter is wired,
# so there is no shutdown stall when no collector is reachable.
otel:
  enabled: false
  endpoint: "localhost:4317"
