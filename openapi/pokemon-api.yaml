openapi: "3.1.1"
info:
  version: 0.1.0
  title: Pokemon API
  description: API for listing imported Pokemon and opening Pokeballs.
  contact:
    name: Reference Service maintainers
    url: https://github.com/monkescience/reference-service-go

servers:
  - url: https://api.example.com
    description: Production
  - url: https://staging.api.example.com
    description: Staging

paths:
  /pokeball/open:
    post:
      operationId: open_pokeball
      summary: Open a Pokeball to catch a random Pokemon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/open_pokeball_request"
      responses:
        "200":
          description: Pokemon caught successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/open_pokeball_response"
        "400":
          description: Invalid request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/problem_detail"
        "409":
          description: No Pokemon imported yet
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/problem_detail"

  /pokemon:
    get:
      operationId: list_pokemon
      summary: List imported Pokemon
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Number of items to return
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of items to skip
        - name: rarity
          in: query
          schema:
            type: string
            enum:
              - common
              - uncommon
              - rare
              - legendary
              - mythical
          description: Filter by rarity tier
      responses:
        "200":
          description: Pokemon list returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pokemon_list_response"

  /pokemon/{pokedex_id}:
    get:
      operationId: get_pokemon
      summary: Get a Pokemon by Pokedex ID
      parameters:
        - name: pokedex_id
          in: path
          required: true
          schema:
            type: integer
          description: The national Pokedex number
          example: 25
      responses:
        "200":
          description: Pokemon details returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/pokemon_summary"
        "404":
          description: Pokemon not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/problem_detail"

components:
  schemas:
    open_pokeball_request:
      type: object
      additionalProperties: false
      properties:
        pokeball_type:
          type: string
          description: Type of Pokeball to open
          enum:
            - pokeball
            - great_ball
            - ultra_ball
            - master_ball
          examples:
            - "pokeball"
      required:
        - pokeball_type

    open_pokeball_response:
      type: object
      additionalProperties: false
      properties:
        pokemon:
          $ref: "#/components/schemas/pokemon_summary"
        pokeball_type:
          type: string
          enum:
            - pokeball
            - great_ball
            - ultra_ball
            - master_ball
          examples:
            - "great_ball"
        is_shiny:
          type: boolean
          description: Whether this catch is a shiny variant
          examples:
            - false
        caught_at:
          type: string
          format: date-time
          description: When the Pokemon was caught
          examples:
            - "2026-04-04T12:00:00Z"
      required:
        - pokemon
        - pokeball_type
        - is_shiny
        - caught_at

    pokemon_summary:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
          description: National Pokedex number
          examples:
            - 25
        name:
          type: string
          description: Pokemon name
          examples:
            - "pikachu"
        rarity:
          type: string
          description: Rarity tier
          enum:
            - common
            - uncommon
            - rare
            - legendary
            - mythical
          examples:
            - "uncommon"
        types:
          type: array
          items:
            type: string
          description: Pokemon types
          examples:
            - ["electric"]
        sprite_url:
          type: string
          format: uri
          description: URL to the Pokemon sprite image
          examples:
            - "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png"
        stats:
          $ref: "#/components/schemas/pokemon_stats"
      required:
        - id
        - name
        - rarity
        - types
        - sprite_url
        - stats

    pokemon_stats:
      type: object
      additionalProperties: false
      properties:
        hp:
          type: integer
          examples:
            - 35
        attack:
          type: integer
          examples:
            - 55
        defense:
          type: integer
          examples:
            - 40
        special_attack:
          type: integer
          examples:
            - 50
        special_defense:
          type: integer
          examples:
            - 50
        speed:
          type: integer
          examples:
            - 90
      required:
        - hp
        - attack
        - defense
        - special_attack
        - special_defense
        - speed

    pokemon_list_response:
      type: object
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/pokemon_summary"
        total:
          type: integer
          description: Total number of Pokemon matching the query
          examples:
            - 1025
        limit:
          type: integer
          examples:
            - 20
        offset:
          type: integer
          examples:
            - 0
      required:
        - items
        - total
        - limit
        - offset

    problem_detail:
      type: object
      description: RFC 9457 Problem Details
      properties:
        type:
          type: string
          description: URI reference identifying the problem type
          examples:
            - "about:blank"
        title:
          type: string
          description: Short human-readable summary
          examples:
            - "Not Found"
        status:
          type: integer
          description: HTTP status code
          examples:
            - 404
        detail:
          type: string
          description: Human-readable explanation
          examples:
            - "pokemon not found"
        instance:
          type: string
          description: URI reference identifying the specific occurrence
      required:
        - title
        - status
