name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. 0.8.0)
        required: true

permissions:
  id-token: write
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
  HELM_CHART_NAME: reference-service-go
  HELM_REPOSITORY: monkescience/helm-charts
  HELM_VERSION: v4.1.3 # renovate: datasource=github-releases depName=helm/helm

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}
          build-args: |
            VERSION=${{ env.RELEASE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Package Helm chart
        run: helm package chart

      - name: Push Helm chart to GHCR (OCI)
        run: |
          chart_version="$(ruby -e 'require "yaml"; puts YAML.load_file("chart/Chart.yaml")["version"]')"
          package_file="${HELM_CHART_NAME}-${chart_version}.tgz"
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin
          helm push "${package_file}" oci://ghcr.io/${{ env.HELM_REPOSITORY }}
